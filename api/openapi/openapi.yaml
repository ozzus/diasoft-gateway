openapi: 3.0.3
info:
  title: Diasoft Platform API
  version: 1.2.0
  description: Shared OpenAPI contract for the Diasoft diploma verification platform. The file is stored in diasoft-gateway and documents public gateway routes, gateway private auth routes for the new frontend, and registry backoffice routes used by the current diasoft-web. For overlapping private paths such as `/api/v1/university/*` and `/api/v1/student/*`, the path-level schema is the frontend-facing gateway BFF contract. Direct registry-only shapes remain available as `Registry*` component schemas.
servers:
  - url: http://localhost:8080
    description: Gateway local runtime
  - url: http://localhost:8081
    description: Registry local runtime
  - url: https://verify.example.com
    description: Public gateway runtime
  - url: https://registry.example.com
    description: Internal registry runtime
security:
  - bearerAuth: []
tags:
  - name: gateway-auth
  - name: gateway-public
  - name: gateway-pages
  - name: gateway-runtime
  - name: registry-auth
  - name: registry-universities
  - name: registry-imports
  - name: registry-university
  - name: registry-student
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    VerificationToken:
      in: path
      name: verificationToken
      required: true
      schema:
        type: string
    ShareToken:
      in: path
      name: shareToken
      required: true
      schema:
        type: string
    UniversityId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    ImportId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    DiplomaId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    VerificationRequest:
      type: object
      required: [diplomaNumber, universityCode]
      properties:
        diplomaNumber:
          type: string
          example: D-2026-0001
        universityCode:
          type: string
          example: ITMO
    VerificationResult:
      type: object
      required: [verdict]
      properties:
        verdict:
          type: string
          enum: [valid, revoked, expired, not_found]
        universityCode:
          type: string
        diplomaNumber:
          type: string
        ownerNameMask:
          type: string
        program:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    GatewayUserProfile:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [university, student, hr]
        organizationCode:
          type: string
          nullable: true
    GatewayLoginRequest:
      type: object
      required: [login, password, role]
      properties:
        login:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [university, student, hr]
      example:
        login: ITMO
        password: secret
        role: university
    GatewayLoginResponse:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/GatewayUserProfile'
      example:
        accessToken: jwt-token
        user:
          id: 11111111-1111-1111-1111-111111111111
          name: Иван Иванов
          role: university
          organizationCode: ITMO
    GatewayUniversityDiplomaItem:
      type: object
      required: [id, diplomaNumber, universityCode, ownerName, ownerNameMask, program, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        diplomaNumber:
          type: string
        universityCode:
          type: string
        ownerName:
          type: string
        ownerNameMask:
          type: string
        program:
          type: string
        graduationYear:
          type: integer
          nullable: true
        status:
          type: string
          enum: [active, revoked, expired]
        hash:
          type: string
          nullable: true
        verificationToken:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
        revokeReason:
          type: string
          nullable: true
      example:
        id: bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb
        diplomaNumber: D-2026-0001
        universityCode: ITMO
        ownerName: Иван Иванов
        ownerNameMask: И*** И***
        program: Software Engineering
        graduationYear: 2026
        status: active
        hash: d46ed54723c438a62b1e9e95b9d08ac165edd9e7a3ab0fff2e05651887e7e8ee
        verificationToken: itmo-demo-verify-token
        createdAt: '2026-04-04T16:38:19.133447Z'
    GatewayUniversityDiplomaList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GatewayUniversityDiplomaItem'
        total:
          type: integer
      example:
        items:
          - id: bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb
            diplomaNumber: D-2026-0001
            universityCode: ITMO
            ownerName: Иван Иванов
            ownerNameMask: И*** И***
            program: Software Engineering
            graduationYear: 2026
            status: active
            hash: d46ed54723c438a62b1e9e95b9d08ac165edd9e7a3ab0fff2e05651887e7e8ee
            verificationToken: itmo-demo-verify-token
            createdAt: '2026-04-04T16:38:19.133447Z'
        total: 1
    GatewayImportAccepted:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, partially_failed, failed]
      example:
        jobId: cccccccc-cccc-cccc-cccc-cccccccccccc
        status: pending
    GatewayImportStatus:
      type: object
      required: [jobId, status, imported, failed, createdAt, updatedAt]
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, partially_failed, failed]
        total:
          type: integer
          nullable: true
        imported:
          type: integer
        failed:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        jobId: cccccccc-cccc-cccc-cccc-cccccccccccc
        status: partially_failed
        total: 100
        imported: 96
        failed: 4
        createdAt: '2026-04-04T10:00:00Z'
        updatedAt: '2026-04-04T10:05:00Z'
    GatewayImportError:
      type: object
      required: [row, message]
      properties:
        row:
          type: integer
        message:
          type: string
    GatewayImportErrorsResponse:
      type: object
      required: [errors]
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/GatewayImportError'
      example:
        errors:
          - row: 7
            message: Некорректный год выпуска
    GatewayRevokeRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
      example:
        reason: Выявлен подлог
    GatewayQrResponse:
      type: object
      required: [verificationToken, qrUrl, expiresAt]
      properties:
        verificationToken:
          type: string
        qrUrl:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
      example:
        verificationToken: itmo-demo-verify-token
        qrUrl: https://verify.example.com/v/itmo-demo-verify-token
        expiresAt: '2099-12-31T00:00:00Z'
    GatewayStudentDiploma:
      type: object
      required: [id, diplomaNumber, universityCode, program, status, verificationToken]
      properties:
        id:
          type: string
          format: uuid
        diplomaNumber:
          type: string
        universityCode:
          type: string
        program:
          type: string
        graduationYear:
          type: integer
          nullable: true
        status:
          type: string
          enum: [active, revoked, expired]
        verificationToken:
          type: string
      example:
        id: bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb
        diplomaNumber: D-2026-0001
        universityCode: ITMO
        program: Software Engineering
        graduationYear: 2026
        status: active
        verificationToken: itmo-demo-verify-token
    GatewayStudentShareLinkRequest:
      type: object
      required: [ttlSeconds]
      properties:
        ttlSeconds:
          type: integer
          enum: [3600, 86400, 604800, 2592000]
      example:
        ttlSeconds: 86400
    GatewayStudentShareLink:
      type: object
      required: [shareToken, shareUrl, expiresAt, ttlSeconds]
      properties:
        shareToken:
          type: string
        shareUrl:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        ttlSeconds:
          type: integer
          enum: [3600, 86400, 604800, 2592000]
      example:
        shareToken: share-token
        shareUrl: https://verify.example.com/s/share-token
        expiresAt: '2026-04-05T10:00:00Z'
        ttlSeconds: 86400
    RegistryCurrentUser:
      type: object
      required: [subject, roles]
      properties:
        subject:
          type: string
        roles:
          type: array
          items:
            type: string
        universityId:
          type: string
          format: uuid
          nullable: true
        studentExternalId:
          type: string
          nullable: true
      example:
        subject: local-dev-user
        roles: [super_admin, student]
        universityId: 11111111-1111-1111-1111-111111111111
        studentExternalId: student-001
    RegistryUniversity:
      type: object
      required: [id, code, name, createdAt]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    RegistryImportJob:
      type: object
      required: [id, universityId, objectKey, status, processedRows, failedRows, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        universityId:
          type: string
          format: uuid
        objectKey:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, partially_failed, failed]
        totalRows:
          type: integer
          nullable: true
        processedRows:
          type: integer
        failedRows:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: cccccccc-cccc-cccc-cccc-cccccccccccc
        universityId: 11111111-1111-1111-1111-111111111111
        objectKey: imports/itmo-2026.csv
        status: completed
        totalRows: 100
        processedRows: 100
        failedRows: 0
        createdAt: '2026-04-04T10:00:00Z'
        updatedAt: '2026-04-04T10:05:00Z'
    RegistryImportJobError:
      type: object
      required: [id, importJobId, rowNumber, code, message, createdAt]
      properties:
        id:
          type: string
          format: uuid
        importJobId:
          type: string
          format: uuid
        rowNumber:
          type: integer
        code:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      example:
        id: dddddddd-dddd-dddd-dddd-dddddddddddd
        importJobId: cccccccc-cccc-cccc-cccc-cccccccccccc
        rowNumber: 7
        code: invalid_graduation_year
        message: Некорректный год выпуска
        createdAt: '2026-04-04T10:05:00Z'
    RegistryDiploma:
      type: object
      required: [id, universityId, universityCode, studentId, studentExternalId, ownerNameMask, diplomaNumber, programName, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        universityId:
          type: string
          format: uuid
        universityCode:
          type: string
        studentId:
          type: string
          format: uuid
        studentExternalId:
          type: string
        ownerName:
          type: string
          nullable: true
        ownerNameMask:
          type: string
        diplomaNumber:
          type: string
        programName:
          type: string
        graduationYear:
          type: integer
          nullable: true
        recordHash:
          type: string
          nullable: true
        status:
          type: string
        verificationToken:
          type: string
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true
        revokeReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb
        universityId: 11111111-1111-1111-1111-111111111111
        universityCode: ITMO
        studentId: eeeeeeee-eeee-eeee-eeee-eeeeeeeeeeee
        studentExternalId: ITMO:D-2026-0001
        ownerName: Иван Иванов
        ownerNameMask: И*** И***
        diplomaNumber: D-2026-0001
        programName: Software Engineering
        graduationYear: 2026
        recordHash: d46ed54723c438a62b1e9e95b9d08ac165edd9e7a3ab0fff2e05651887e7e8ee
        status: active
        verificationToken: itmo-demo-verify-token
        createdAt: '2026-04-04T16:38:19.133447Z'
        updatedAt: '2026-04-04T16:38:19.133447Z'
    RegistryRevokeRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
      example:
        reason: Revoked by university operator
    RegistryShareLinkRequest:
      type: object
      properties:
        maxViews:
          type: integer
          minimum: 1
      example:
        maxViews: 5
    RegistryShareLink:
      type: object
      required: [id, diplomaId, shareToken, expiresAt, usedViews, status, shareUrl]
      properties:
        id:
          type: string
          format: uuid
        diplomaId:
          type: string
          format: uuid
        shareToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        maxViews:
          type: integer
          nullable: true
        usedViews:
          type: integer
        status:
          type: string
        shareUrl:
          type: string
      example:
        id: ffffffff-ffff-ffff-ffff-ffffffffffff
        diplomaId: bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb
        shareToken: share-token
        expiresAt: '2026-04-05T10:00:00Z'
        maxViews: 5
        usedViews: 0
        status: active
        shareUrl: https://verify.example.com/s/share-token
paths:
  /api/v1/auth/login:
    post:
      tags: [gateway-auth]
      summary: Login into the gateway private API
      operationId: gatewayPrivateLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayLoginRequest'
      responses:
        '200':
          description: JWT session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayLoginResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/me:
    get:
      tags: [gateway-auth]
      summary: Restore current gateway private session
      operationId: gatewayPrivateMe
      responses:
        '200':
          description: Current private API user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayUserProfile'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/public/verify:
    post:
      tags: [gateway-public]
      summary: Verify diploma by number and university code
      operationId: verifyDiplomaByNumber
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/public/verify/{verificationToken}:
    get:
      tags: [gateway-public]
      summary: Verify diploma by verification token
      operationId: verifyDiplomaByToken
      security: []
      parameters:
        - $ref: '#/components/parameters/VerificationToken'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResult'
        '400':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/public/share-links/{shareToken}:
    get:
      tags: [gateway-public]
      summary: Resolve public share link by token
      operationId: resolveShareLink
      security: []
      parameters:
        - $ref: '#/components/parameters/ShareToken'
      responses:
        '200':
          description: Share-link verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResult'
        '400':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v/{verificationToken}:
    get:
      tags: [gateway-pages]
      summary: Render public verification page for QR scans
      operationId: renderVerificationPage
      security: []
      parameters:
        - $ref: '#/components/parameters/VerificationToken'
      responses:
        '200':
          description: HTML verification page
  /s/{shareToken}:
    get:
      tags: [gateway-pages]
      summary: Render public share-link page
      operationId: renderShareLinkPage
      security: []
      parameters:
        - $ref: '#/components/parameters/ShareToken'
      responses:
        '200':
          description: HTML share-link page
  /healthz:
    get:
      tags: [gateway-runtime]
      summary: Liveness probe
      operationId: gatewayLiveness
      security: []
      responses:
        '200':
          description: Gateway process is alive
  /readyz:
    get:
      tags: [gateway-runtime]
      summary: Readiness probe
      operationId: gatewayReadiness
      security: []
      responses:
        '200':
          description: Gateway is ready to serve traffic
  /metrics:
    get:
      tags: [gateway-runtime]
      summary: Prometheus metrics endpoint
      operationId: gatewayMetrics
      security: []
      responses:
        '200':
          description: Prometheus text exposition format
  /api/v1/ping:
    get:
      tags: [registry-auth]
      summary: Ping the registry service
      operationId: pingRegistry
      responses:
        '200':
          description: Registry is alive
  /api/v1/me:
    get:
      tags: [registry-auth]
      summary: Get current scoped user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryCurrentUser'
  /api/v1/universities:
    get:
      tags: [registry-universities]
      summary: List universities visible to the current operator
      operationId: listUniversities
      responses:
        '200':
          description: University list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistryUniversity'
  /api/v1/universities/{id}/imports:
    get:
      tags: [registry-imports]
      summary: List import jobs for a university
      operationId: listImportJobs
      parameters:
        - $ref: '#/components/parameters/UniversityId'
      responses:
        '200':
          description: Import jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistryImportJob'
    post:
      tags: [registry-imports]
      summary: Create an import job
      operationId: createImportJob
      parameters:
        - $ref: '#/components/parameters/UniversityId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Accepted import
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryImportJob'
  /api/v1/imports/{id}:
    get:
      tags: [registry-imports]
      summary: Get import job
      operationId: getImportJob
      parameters:
        - $ref: '#/components/parameters/ImportId'
      responses:
        '200':
          description: Import job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryImportJob'
  /api/v1/imports/{id}/errors:
    get:
      tags: [registry-imports]
      summary: Get import row errors
      operationId: getImportErrors
      parameters:
        - $ref: '#/components/parameters/ImportId'
      responses:
        '200':
          description: Import errors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistryImportJobError'
  /api/v1/university/diplomas:
    get:
      tags: [gateway-auth]
      summary: List diplomas visible to the current university user in the gateway private API
      operationId: listUniversityDiplomas
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [active, revoked, expired]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Paginated university diploma list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayUniversityDiplomaList'
  /api/v1/university/diplomas/{id}/revoke:
    post:
      tags: [gateway-auth]
      summary: Revoke a diploma through the gateway private API
      operationId: revokeUniversityDiploma
      parameters:
        - $ref: '#/components/parameters/DiplomaId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GatewayRevokeRequest'
      responses:
        '200':
          description: Diploma revoked
  /api/v1/university/diplomas/{id}/qr:
    get:
      tags: [gateway-auth]
      summary: Get QR payload for a diploma in the gateway private API
      operationId: getUniversityDiplomaQr
      parameters:
        - $ref: '#/components/parameters/DiplomaId'
      responses:
        '200':
          description: QR payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayQrResponse'
  /api/v1/university/diplomas/upload:
    post:
      tags: [gateway-auth]
      summary: Upload university diplomas through the gateway private API
      description: Accepts `.csv` and `.xlsx` files only. The upload is asynchronous. A successful request returns an import job id, and row-level issues are later available through `/api/v1/university/imports/{jobId}` and `/api/v1/university/imports/{jobId}/errors`.
      operationId: uploadUniversityDiplomas
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV or XLSX file with a diploma registry batch.
      responses:
        '202':
          description: Import accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayImportAccepted'
        '400':
          description: Invalid upload envelope or unsupported file type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/university/imports/{jobId}:
    get:
      tags: [gateway-auth]
      summary: Get university import job status from the gateway private API
      operationId: getUniversityImportStatus
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Import status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayImportStatus'
